# Cloud Build pipeline pro deploy z gitu na Cloud Run.
# Trigger: připoj GitHub repo v Cloud Build → push do větve spustí tento build.
# Aplikace je v podsložce datalayer-web/, build proto běží z kořene repa
# s build kontextem ./datalayer-web.
#
# Data se ukládají do Firestore (Native) – žádná DB instance; runtime service
# account potřebuje role Cloud Datastore User a (kvůli SESSION_SECRET) Secret
# Manager Secret Accessor.
#
# Předpoklad: secret SESSION_SECRET existuje v Secret Manageru (podpis admin
# cookie). Vytvoření: openssl rand -base64 32 | gcloud secrets create SESSION_SECRET --data-file=-
#
# Substituce nastav v triggeru:
#   _REGION   (např. europe-west1)
#   _SERVICE  (např. datalayer-web)
#   _AR_REPO  (Artifact Registry repo, např. datalayer)

substitutions:
  _REGION: europe-west1
  _SERVICE: datalayer-web
  _AR_REPO: datalayer

steps:
  # 1) Build Docker image (kontext = podsložka datalayer-web).
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$COMMIT_SHA
      - datalayer-web

  # 2) Push do Artifact Registry.
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$COMMIT_SHA

  # 3) Deploy na Cloud Run. Firestore se autentizuje přes runtime SA (ADC),
  #    GOOGLE_CLOUD_PROJECT zajistí správný projekt pro klienta.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --set-env-vars=NODE_ENV=production,GOOGLE_CLOUD_PROJECT=$PROJECT_ID
      - --set-secrets=SESSION_SECRET=SESSION_SECRET:latest

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
